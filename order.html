<!DOCTYPE html>
<html lang="ms">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Order — Self Ordering</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,600;0,9..144,700;1,9..144,500&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --ink:#122019;
  --paper:#F8F4E8;
  --paper-2:#EFE6CF;
  --green:#0B6E4F;
  --green-dark:#074A35;
  --green-light:#D9ECE0;
  --char:#332E22;
  --char-soft:#6e6354;
  --sage:#3F8F6B;
  --gold:#C9A227;
  --gold-dark:#8A6C14;
  --gold-light:#F3E7BD;
  --line:#DCD3B0;
  --white:#FFFFFF;
  --red:#B23A3A;
  --shadow:0 2px 10px rgba(18,32,25,0.10);
  --shadow-lg:0 12px 32px rgba(18,32,25,0.22);
  --radius:10px;
  --display:'Fraunces',serif;
  --body:'Plus Jakarta Sans',system-ui,sans-serif;
  --mono:'JetBrains Mono',monospace;
}
*{box-sizing:border-box;}
body{margin:0;font-family:var(--body);background:var(--paper);color:var(--char);-webkit-tap-highlight-color:transparent;}
button{font-family:var(--body);cursor:pointer;}
img{max-width:100%;}

.wrap{max-width:560px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column;background:var(--paper);}

/* ---- header: ticket-stub style, ties to the printed slip / receipt look ---- */
.stub{
  background:var(--green-dark);color:var(--white);padding:18px 20px 22px;
  position:relative;text-align:center;
}
.stub::after{
  content:"";position:absolute;left:0;right:0;bottom:-1px;height:10px;
  background-image:radial-gradient(circle at 8px 5px, transparent 5px, var(--paper) 5.5px);
  background-size:16px 10px;background-repeat:repeat-x;
}
.stub .rname{font-family:var(--display);font-weight:600;font-size:19px;}
.stub .tnum{font-family:var(--mono);font-weight:700;font-size:14px;letter-spacing:0.5px;color:var(--gold-light);margin-top:4px;}
.lang-row{position:absolute;top:14px;right:14px;display:flex;gap:4px;}
.lang-btn{padding:3px 8px;border-radius:6px;font-size:11px;font-weight:700;border:1px solid rgba(255,255,255,0.35);background:transparent;color:rgba(255,255,255,0.75);}
.lang-btn.active{background:var(--gold);color:var(--green-dark);border-color:var(--gold);}

/* ---- category nav ---- */
.cat-nav{display:flex;gap:8px;overflow-x:auto;padding:14px 16px;position:sticky;top:0;background:var(--paper);z-index:5;border-bottom:1px solid var(--line);}
.cat-nav::-webkit-scrollbar{display:none;}
.cat-pill{flex:0 0 auto;padding:8px 16px;border-radius:999px;border:2px solid var(--line);background:var(--white);font-weight:700;font-size:13.5px;color:var(--char);white-space:nowrap;}
.cat-pill.active{border-color:var(--green);background:var(--green-light);color:var(--green-dark);}

/* ---- menu list ---- */
.menu-area{flex:1;padding:4px 16px 90px;}
.cat-heading{font-family:var(--display);font-weight:600;font-size:18px;margin:18px 0 10px;color:var(--green-dark);}
.item-row{display:flex;align-items:center;gap:12px;background:var(--white);border:1px solid var(--line);border-radius:var(--radius);padding:12px 14px;margin-bottom:10px;}
.item-info{flex:1;min-width:0;}
.item-name{font-weight:700;font-size:15px;}
.item-price{font-family:var(--mono);color:var(--char-soft);font-size:13.5px;margin-top:2px;}
.add-btn{flex:0 0 auto;padding:8px 16px;border-radius:8px;border:none;background:var(--green);color:var(--white);font-weight:700;font-size:13.5px;}
.stepper{flex:0 0 auto;display:flex;align-items:center;gap:10px;}
.step-btn{width:30px;height:30px;border-radius:8px;border:2px solid var(--green);background:var(--white);color:var(--green-dark);font-weight:800;font-size:16px;display:flex;align-items:center;justify-content:center;}
.step-qty{font-family:var(--mono);font-weight:700;min-width:18px;text-align:center;}

/* ---- floating cart bar ---- */
.cart-bar{
  position:fixed;left:0;right:0;bottom:0;max-width:560px;margin:0 auto;
  background:var(--ink);color:var(--white);padding:14px 18px;
  display:flex;align-items:center;justify-content:space-between;
  border-radius:14px 14px 0 0;box-shadow:var(--shadow-lg);
  transform:translateY(110%);transition:transform .25s ease;
}
.cart-bar.show{transform:translateY(0);}
.cart-bar .cb-left{font-size:13.5px;color:var(--paper-2);}
.cart-bar .cb-total{font-family:var(--mono);font-weight:700;font-size:17px;}
.cart-bar .cb-btn{background:var(--gold);color:var(--green-dark);border:none;border-radius:8px;padding:10px 18px;font-weight:800;font-size:14px;}

/* ---- cart drawer ---- */
.drawer-overlay{position:fixed;inset:0;background:rgba(18,32,25,0.55);z-index:50;display:flex;align-items:flex-end;justify-content:center;}
.drawer{
  background:var(--paper);width:100%;max-width:560px;border-radius:18px 18px 0 0;
  max-height:86vh;display:flex;flex-direction:column;box-shadow:var(--shadow-lg);
}
.drawer-head{display:flex;align-items:center;justify-content:space-between;padding:18px 20px;border-bottom:1px solid var(--line);}
.drawer-head h3{margin:0;font-family:var(--display);font-size:19px;}
.drawer-close{background:none;border:none;font-size:22px;color:var(--char-soft);}
.drawer-body{flex:1;overflow-y:auto;padding:14px 20px;}
.cart-row{display:flex;align-items:flex-start;gap:10px;padding:12px 0;border-bottom:1px solid var(--line);}
.cart-row-info{flex:1;}
.cart-row-name{font-weight:700;font-size:14.5px;}
.cart-row-price{font-family:var(--mono);color:var(--char-soft);font-size:13px;margin-top:2px;}
.notes-input{width:100%;margin-top:8px;padding:8px 10px;border:1px solid var(--line);border-radius:7px;font-size:13px;font-family:var(--body);background:var(--white);}
.cart-row-remove{font-size:12px;color:var(--red);font-weight:700;background:none;border:none;margin-top:6px;}
.drawer-foot{padding:16px 20px;border-top:1px solid var(--line);background:var(--white);}
.foot-total{display:flex;justify-content:space-between;font-weight:800;font-size:17px;margin-bottom:12px;}
.confirm-btn{width:100%;padding:14px;border-radius:10px;border:none;background:var(--green);color:var(--white);font-weight:800;font-size:15.5px;}
.confirm-btn:disabled{background:var(--line);color:var(--char-soft);}
.empty-note{text-align:center;color:var(--char-soft);padding:30px 0;font-size:14px;}

/* ---- full-screen states: loading / error / confirmed ---- */
.full-state{flex:1;display:flex;align-items:center;justify-content:center;padding:30px;}
.state-card{text-align:center;max-width:380px;}
.state-card .emoji{font-size:40px;margin-bottom:14px;}
.state-card h2{font-family:var(--display);font-size:21px;margin:0 0 8px;}
.state-card p{color:var(--char-soft);font-size:14.5px;line-height:1.6;margin:0 0 18px;}
.confirm-ticket{background:var(--white);border-radius:4px;position:relative;box-shadow:var(--shadow);padding:26px 22px;text-align:center;max-width:340px;}
.confirm-ticket::before,.confirm-ticket::after{content:"";position:absolute;left:0;right:0;height:10px;background-image:radial-gradient(circle at 8px 5px, transparent 5px, var(--paper) 5.5px);background-size:16px 10px;background-repeat:repeat-x;}
.confirm-ticket::before{top:-1px;}
.confirm-ticket::after{bottom:-1px;transform:scaleY(-1);}
.stamp{width:64px;height:64px;border-radius:50%;background:var(--green-light);color:var(--green-dark);display:flex;align-items:center;justify-content:center;font-size:30px;margin:0 auto 14px;}
.tear-line{border-top:1.5px dashed var(--line);margin:14px 0;}
.again-btn{margin-top:18px;padding:12px 22px;border-radius:9px;border:2px solid var(--green);background:var(--white);color:var(--green-dark);font-weight:800;font-size:14px;}
</style>
</head>
<body>
<div class="wrap" id="app"></div>

<script>
/* =========================================================
   CUSTOMER SELF-ORDERING PAGE
   Standalone and lightweight on purpose -- this is what loads on a
   customer's phone after scanning the QR slip printed at their table,
   so it intentionally does NOT carry any of the staff app's code.

   Fill in the same Supabase project details used in index.html below.
   These two values are already filled in to match the WarungOS project.
   ========================================================= */
const SUPABASE_URL = 'https://rggpgdvgtxjdpivpqdmj.supabase.co';
const SUPABASE_ANON_KEY = 'sb_publishable_RhnmcO1X_R_3J2d1h_EENw_h1bZAWh5';

const I18N = {
  ms:{
    loading:'Memuatkan menu...', invalid_link:'Pautan tidak sah. Sila imbas kod QR di meja anda.',
    menu_unavailable:'Menu tidak tersedia sekarang. Sila tanya kakitangan untuk bantuan.',
    table_label:'Meja {n}', cart_empty:'Troli kosong, sila tambah item dari menu.',
    add:'Tambah', notes_placeholder:'Nota (pilihan)', confirm_order:'Sahkan Pesanan',
    view_cart:'Lihat Troli', your_order:'Pesanan Anda', order_sent_title:'Pesanan Dihantar!',
    order_sent_sub:'Slip anda akan dicetak di kaunter sebentar lagi. Selamat menjamu selera!',
    order_more:'Pesan Lagi', empty_cart_warning:'Sila tambah item sebelum sahkan',
    submit_error:'Gagal hantar pesanan. Sila cuba lagi.', remove:'Buang', total_label:'Jumlah',
    sending:'Menghantar...'
  },
  en:{
    loading:'Loading menu...', invalid_link:"This link isn't valid. Please scan the QR code at your table.",
    menu_unavailable:'Menu not available right now. Please ask a staff member for help.',
    table_label:'Table {n}', cart_empty:'Your cart is empty — add something from the menu.',
    add:'Add', notes_placeholder:'Notes (optional)', confirm_order:'Confirm Order',
    view_cart:'View Cart', your_order:'Your Order', order_sent_title:'Order Sent!',
    order_sent_sub:'Your slip will be printed at the counter shortly. Enjoy your meal!',
    order_more:'Order More', empty_cart_warning:'Add an item before confirming',
    submit_error:'Could not send your order. Please try again.', remove:'Remove', total_label:'Total',
    sending:'Sending...'
  },
  zh:{
    loading:'正在加载菜单...', invalid_link:'链接无效，请扫描桌上的二维码。',
    menu_unavailable:'暂时无法显示菜单，请联系工作人员。',
    table_label:'{n}号桌', cart_empty:'购物车是空的，请从菜单中添加。',
    add:'添加', notes_placeholder:'备注（可选）', confirm_order:'确认订单',
    view_cart:'查看购物车', your_order:'您的订单', order_sent_title:'订单已发送！',
    order_sent_sub:'您的订单单将很快在柜台打印。祝您用餐愉快！',
    order_more:'继续点餐', empty_cart_warning:'请先添加商品再确认',
    submit_error:'订单发送失败，请重试。', remove:'移除', total_label:'总计',
    sending:'发送中...'
  }
};
function getLang(){ return localStorage.getItem('DAPUR_ORDER_LANG_v1') || 'ms'; }
function setLang(l){ localStorage.setItem('DAPUR_ORDER_LANG_v1', l); app.lang = l; render(); }
function t(key, vars){
  let s = (I18N[app.lang] && I18N[app.lang][key]) || I18N.ms[key] || key;
  if(vars) Object.keys(vars).forEach(k=>{ s = s.replace('{'+k+'}', vars[k]); });
  return s;
}
function escapeHtml(str){
  return String(str==null?'':str).replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

const params = new URLSearchParams(window.location.search);
const app = {
  lang: getLang(),
  key: params.get('key'),
  table: params.get('table'),
  session: params.get('session'),
  view: 'loading', // loading | invalid | unavailable | browsing | sending | confirmed
  categories: [], items: [], currency: 'RM', restaurantName: '',
  activeCategory: null,
  cart: [], // {itemId, name, price, qty, notes}
  drawerOpen: false,
  lastOrderNo: null
};

function fmt(n){ return app.currency + (n||0).toFixed(2); }

async function loadMenu(){
  if(!app.key || !app.table || !app.session){
    app.view = 'invalid'; render(); return;
  }
  try{
    const url = SUPABASE_URL + '/rest/v1/restaurant_menu?license_key=eq.' + encodeURIComponent(app.key) + '&select=menu_json';
    const res = await fetch(url, { headers:{ apikey: SUPABASE_ANON_KEY, Authorization:'Bearer '+SUPABASE_ANON_KEY } });
    const rows = await res.json();
    if(!res.ok || rows.length===0){ app.view = 'unavailable'; render(); return; }
    const menu = rows[0].menu_json;
    app.categories = menu.categories || [];
    app.items = (menu.items || []).filter(i=>i.available);
    app.currency = menu.currency || 'RM';
    app.restaurantName = menu.restaurantName || '';
    app.activeCategory = app.categories[0] ? app.categories[0].id : null;
    app.view = 'browsing';
  }catch(err){
    app.view = 'unavailable';
  }
  render();
}

function addToCart(itemId){
  const item = app.items.find(i=>i.id===itemId);
  if(!item) return;
  const existing = app.cart.find(c=>c.itemId===itemId);
  if(existing) existing.qty++;
  else app.cart.push({itemId, name:item.name, price:item.price, qty:1, notes:''});
  render();
}
function cartQty(itemId){
  const c = app.cart.find(c=>c.itemId===itemId);
  return c ? c.qty : 0;
}
function changeQty(itemId, delta){
  const c = app.cart.find(c=>c.itemId===itemId);
  if(!c) return;
  c.qty += delta;
  if(c.qty<=0) app.cart = app.cart.filter(x=>x.itemId!==itemId);
  render();
}
function setNote(itemId, val){
  const c = app.cart.find(c=>c.itemId===itemId);
  if(c) c.notes = val;
}
function cartTotal(){ return app.cart.reduce((s,c)=>s+c.price*c.qty,0); }
function cartCount(){ return app.cart.reduce((s,c)=>s+c.qty,0); }

async function submitOrder(){
  if(app.cart.length===0) return;
  app.view = 'sending'; render();
  try{
    const res = await fetch(SUPABASE_URL + '/rest/v1/customer_orders', {
      method:'POST',
      headers:{
        apikey: SUPABASE_ANON_KEY, Authorization:'Bearer '+SUPABASE_ANON_KEY,
        'Content-Type':'application/json', 'Prefer':'return=minimal'
      },
      body: JSON.stringify({
        license_key: app.key,
        table_number: parseInt(app.table, 10),
        session_token: app.session,
        items: app.cart.map(c=>({itemId:c.itemId, name:c.name, price:c.price, qty:c.qty, notes:c.notes})),
        received: false
      })
    });
    if(!res.ok) throw new Error('submit failed');
    app.cart = [];
    app.drawerOpen = false;
    app.view = 'confirmed';
  }catch(err){
    app.view = 'browsing';
    app.drawerOpen = true;
    alert(t('submit_error'));
  }
  render();
}

function langRow(dark){
  return `<div class="lang-row">
    ${['ms','en','zh'].map(l=>`<button class="lang-btn ${app.lang===l?'active':''}" onclick="setLang('${l}')">${l.toUpperCase()}</button>`).join('')}
  </div>`;
}

function renderStub(){
  return `<div class="stub">
    ${langRow()}
    <div class="rname">${escapeHtml(app.restaurantName)}</div>
    ${app.table ? `<div class="tnum">${t('table_label',{n:app.table})}</div>` : ''}
  </div>`;
}

function renderFullState(emoji, title, sub){
  return `<div class="full-state"><div class="state-card">
    <div class="emoji">${emoji}</div><h2>${title}</h2><p>${sub}</p>
  </div></div>`;
}

function renderMenu(){
  const itemsInCat = app.items.filter(i=>i.categoryId===app.activeCategory);
  return `
    <div class="cat-nav">
      ${app.categories.map(c=>`<button class="cat-pill ${app.activeCategory===c.id?'active':''}" onclick="app.activeCategory='${c.id}';render();">${escapeHtml(c.name)}</button>`).join('')}
    </div>
    <div class="menu-area">
      ${itemsInCat.map(i=>{
        const qty = cartQty(i.id);
        return `<div class="item-row">
          <div class="item-info">
            <div class="item-name">${escapeHtml(i.name)}</div>
            <div class="item-price">${fmt(i.price)}</div>
          </div>
          ${qty>0
            ? `<div class="stepper">
                <button class="step-btn" onclick="changeQty('${i.id}',-1)">−</button>
                <span class="step-qty">${qty}</span>
                <button class="step-btn" onclick="changeQty('${i.id}',1)">+</button>
              </div>`
            : `<button class="add-btn" onclick="addToCart('${i.id}')">${t('add')}</button>`
          }
        </div>`;
      }).join('') || `<div class="empty-note">—</div>`}
    </div>
    ${cartCount()>0 ? `
      <div class="cart-bar show">
        <div>
          <div class="cb-left">${cartCount()} ${t('your_order').toLowerCase()}</div>
          <div class="cb-total">${fmt(cartTotal())}</div>
        </div>
        <button class="cb-btn" onclick="app.drawerOpen=true;render();">${t('view_cart')}</button>
      </div>
    ` : ''}
    ${app.drawerOpen ? renderDrawer() : ''}
  `;
}

function renderDrawer(){
  return `
    <div class="drawer-overlay" onclick="if(event.target===this){app.drawerOpen=false;render();}">
      <div class="drawer">
        <div class="drawer-head"><h3>${t('your_order')}</h3><button class="drawer-close" onclick="app.drawerOpen=false;render();">×</button></div>
        <div class="drawer-body">
          ${app.cart.length ? app.cart.map(c=>`
            <div class="cart-row">
              <div class="cart-row-info">
                <div class="cart-row-name">${c.qty}× ${escapeHtml(c.name)}</div>
                <div class="cart-row-price">${fmt(c.price*c.qty)}</div>
                <input class="notes-input" placeholder="${t('notes_placeholder')}" value="${escapeHtml(c.notes)}" oninput="setNote('${c.itemId}', this.value)">
                <button class="cart-row-remove" onclick="changeQty('${c.itemId}', -${c.qty})">${t('remove')}</button>
              </div>
            </div>
          `).join('') : `<div class="empty-note">${t('cart_empty')}</div>`}
        </div>
        <div class="drawer-foot">
          <div class="foot-total"><span>${t('total_label')}</span><span>${fmt(cartTotal())}</span></div>
          <button class="confirm-btn" ${app.cart.length===0?'disabled':''} onclick="submitOrder()">${t('confirm_order')}</button>
        </div>
      </div>
    </div>
  `;
}

function renderConfirmed(){
  return `<div class="full-state">
    <div class="confirm-ticket">
      <div class="stamp">✓</div>
      <h2 style="font-family:var(--display);font-size:20px;margin:0 0 6px;">${t('order_sent_title')}</h2>
      <p style="color:var(--char-soft);font-size:14px;line-height:1.6;margin:0;">${t('order_sent_sub')}</p>
      <div class="tear-line"></div>
      <button class="again-btn" onclick="app.view='browsing';render();">${t('order_more')}</button>
    </div>
  </div>`;
}

function render(){
  const el = document.getElementById('app');
  if(app.view==='loading'){
    el.innerHTML = renderFullState('🍽️', '', t('loading'));
    return;
  }
  if(app.view==='invalid'){
    el.innerHTML = renderFullState('⚠️', '', t('invalid_link'));
    return;
  }
  if(app.view==='unavailable'){
    el.innerHTML = renderStub() + renderFullState('🍽️', '', t('menu_unavailable'));
    return;
  }
  if(app.view==='sending'){
    el.innerHTML = renderStub() + renderFullState('⏳', '', t('sending'));
    return;
  }
  if(app.view==='confirmed'){
    el.innerHTML = renderStub() + renderConfirmed();
    return;
  }
  el.innerHTML = renderStub() + renderMenu();
}

loadMenu();
</script>
</body>
</html>
