<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no">
<title>DapurPOS — Order, Bill & Daily Accounts</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,600;0,9..144,700;1,9..144,500&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
/* ============ TOKENS ============ */
:root{
  --ink:#122019;
  --ink-soft:#1C2E23;
  --paper:#F8F4E8;
  --paper-2:#EFE6CF;
  --paper-3:#E4D7AE;
  --green:#0B6E4F;
  --green-dark:#074A35;
  --green-light:#D9ECE0;
  --char:#332E22;
  --char-soft:#6e6354;
  --sage:#3F8F6B;
  --sage-light:#DCEEE3;
  --gold:#C9A227;
  --gold-dark:#8A6C14;
  --gold-light:#F3E7BD;
  --line:#DCD3B0;
  --line-dark:#2F4439;
  --white:#FFFFFF;
  --red:#B23A3A;
  --red-light:#F3DCDA;
  --shadow:0 2px 10px rgba(18,32,25,0.10);
  --shadow-lg:0 12px 32px rgba(18,32,25,0.22);
  --radius:10px;
  --display:'Fraunces',serif;
  --body:'Plus Jakarta Sans',system-ui,sans-serif;
  --mono:'JetBrains Mono',monospace;
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;}
body{
  font-family:var(--body);
  background:var(--paper-2);
  color:var(--ink);
  -webkit-font-smoothing:antialiased;
}
button{font-family:inherit;cursor:pointer;border:none;background:none;}
input,select,textarea{font-family:inherit;}
::selection{background:var(--green-light);}

/* ============ LAYOUT SHELL ============ */
#app{min-height:100vh;display:flex;flex-direction:column;}
.topbar{
  background:var(--ink);
  color:var(--paper);
  display:flex;align-items:center;
  padding:10px 18px;
  gap:18px;
  position:sticky;top:0;z-index:50;
  border-bottom:3px solid var(--gold);
}
.brand{display:flex;align-items:center;gap:9px;}
.brand-mark{
  width:34px;height:34px;border-radius:8px;
  background:var(--green);
  display:flex;align-items:center;justify-content:center;
  font-family:var(--display);font-weight:700;font-size:18px;color:var(--gold);
  flex-shrink:0;
}
.brand-name{font-family:var(--display);font-weight:600;font-size:19px;letter-spacing:.2px;}
.brand-sub{font-family:var(--mono);font-size:10px;color:var(--paper-3);letter-spacing:1px;text-transform:uppercase;margin-top:-2px;}
.portal-switch{
  display:flex;gap:4px;background:rgba(255,255,255,0.06);padding:4px;border-radius:10px;margin-left:8px;
}
.portal-btn{
  padding:8px 16px;border-radius:7px;color:var(--paper-3);font-weight:600;font-size:13.5px;
  display:flex;align-items:center;gap:7px;transition:.15s;white-space:nowrap;
}
.portal-btn .dot{width:7px;height:7px;border-radius:50%;background:var(--char-soft);}
.portal-btn.active{background:var(--green);color:var(--white);}
.portal-btn.active .dot{background:var(--white);}
.portal-btn .badge{
  background:var(--red);color:white;font-size:10.5px;font-weight:700;border-radius:20px;
  padding:1px 6px;font-family:var(--mono);
}
.portal-btn:not(.active):hover{background:rgba(255,255,255,0.08);color:var(--paper);}
.lang-switch{display:flex;gap:2px;background:rgba(255,255,255,0.06);padding:3px;border-radius:8px;}
.lang-btn{padding:6px 10px;border-radius:6px;font-size:11.5px;font-weight:700;color:var(--paper-3);}
.lang-btn.active{background:var(--gold);color:var(--ink);}
.lang-btn:not(.active):hover{background:rgba(255,255,255,0.08);color:var(--paper);}
.topbar-right{margin-left:auto;display:flex;align-items:center;gap:14px;font-size:12.5px;color:var(--paper-3);}
.topbar-right .clock{font-family:var(--mono);color:var(--paper);font-size:13px;}
.topbar-right .rname{font-weight:600;color:var(--paper);}

.view{flex:1;display:none;}
.view.active{display:block;}

/* ============ TICKET SIGNATURE ELEMENT ============ */
.ticket{
  background:var(--white);
  border-radius:4px;
  position:relative;
  box-shadow:var(--shadow);
}
.ticket::before, .ticket::after{
  content:"";position:absolute;left:0;right:0;height:10px;
  background-image:radial-gradient(circle at 8px 5px, transparent 5px, var(--paper-2) 5.5px);
  background-size:16px 10px;background-repeat:repeat-x;
}
.ticket::before{top:-1px;}
.ticket::after{bottom:-1px;transform:scaleY(-1);}
.ticket-num{font-family:var(--mono);font-weight:700;letter-spacing:0.5px;}
.tear{border-top:1.5px dashed var(--line);margin:10px 0;}

/* ============ COMMON UI ============ */
.pill{display:inline-flex;align-items:center;gap:5px;padding:3px 10px;border-radius:20px;font-size:11.5px;font-weight:700;text-transform:uppercase;letter-spacing:.4px;}
.pill-new{background:var(--red-light);color:var(--red);}
.pill-preparing{background:var(--gold-light);color:var(--gold-dark);}
.pill-ready{background:var(--sage-light);color:var(--green-dark);}
.pill-served{background:#E3E8EC;color:#4a5a68;}
.pill-available{background:var(--sage-light);color:var(--green-dark);}
.pill-occupied{background:var(--gold-light);color:var(--gold-dark);}
.pill-billing{background:var(--gold-light);color:var(--gold-dark);}

.btn{
  padding:10px 18px;border-radius:8px;font-weight:700;font-size:14px;display:inline-flex;align-items:center;gap:7px;
  transition:.15s;
}
.btn-primary{background:var(--green);color:white;}
.btn-primary:hover{background:var(--green-dark);}
.btn-dark{background:var(--ink);color:var(--paper);}
.btn-dark:hover{background:var(--ink-soft);}
.btn-outline{background:transparent;border:1.5px solid var(--line);color:var(--char);}
.btn-outline:hover{border-color:var(--char-soft);}
.btn-sage{background:var(--sage);color:white;}
.btn-sage:hover{background:#2F7456;}
.btn-gold{background:var(--gold);color:var(--ink);}
.btn-gold:hover{background:#A8881F;}
.btn-danger{background:transparent;color:var(--red);}
.btn-danger:hover{background:var(--red-light);}
.btn-sm{padding:6px 12px;font-size:12.5px;border-radius:6px;}
.btn-block{width:100%;justify-content:center;}
.btn:disabled{opacity:.4;cursor:not-allowed;}

.card{background:var(--white);border-radius:var(--radius);box-shadow:var(--shadow);padding:16px;}
.input, .select{
  width:100%;padding:10px 12px;border:1.5px solid var(--line);border-radius:8px;font-size:14px;background:var(--white);color:var(--ink);
}
.input:focus, .select:focus{outline:none;border-color:var(--green);}
.field-label{font-size:12px;font-weight:700;color:var(--char-soft);text-transform:uppercase;letter-spacing:.4px;margin-bottom:5px;display:block;}
.field{margin-bottom:14px;}
.section-title{font-family:var(--display);font-weight:600;font-size:22px;margin:0 0 4px;}
.section-sub{color:var(--char-soft);font-size:13.5px;margin:0 0 18px;}
.empty-state{text-align:center;padding:50px 20px;color:var(--char-soft);}
.empty-state .ei{font-size:38px;margin-bottom:10px;}

/* ============ POS VIEW ============ */
.pos-wrap{display:grid;grid-template-columns:1fr 380px;gap:0;min-height:calc(100vh - 56px);}
.pos-main{padding:18px;overflow-y:auto;}
.pos-tabs{display:flex;gap:6px;margin-bottom:16px;background:var(--paper-3);padding:4px;border-radius:9px;width:fit-content;}
.pos-tab{padding:9px 18px;border-radius:6px;font-weight:700;font-size:13.5px;color:var(--char-soft);}
.pos-tab.active{background:var(--white);color:var(--ink);box-shadow:var(--shadow);}

.order-type-row{display:flex;gap:10px;margin-bottom:16px;}
.type-btn{flex:1;padding:13px;border-radius:9px;border:2px solid var(--line);background:var(--white);font-weight:700;font-size:14px;display:flex;align-items:center;justify-content:center;gap:8px;color:var(--char);}
.type-btn.active{border-color:var(--green);background:var(--green-light);color:var(--green-dark);}

.table-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(86px,1fr));gap:10px;margin-bottom:20px;}
.table-chip{
  aspect-ratio:1;border-radius:10px;border:2px solid var(--line);background:var(--white);
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;font-weight:700;
}
.table-chip .tn{font-family:var(--mono);font-size:19px;}
.table-chip .ts{font-size:9.5px;text-transform:uppercase;letter-spacing:.3px;color:var(--char-soft);}
.table-chip.available{border-color:var(--sage);}
.table-chip.occupied{border-color:var(--gold);background:var(--gold-light);}
.table-chip.occupied .ts{color:var(--gold-dark);}
.table-chip.billing{border-color:var(--gold);background:var(--gold-light);}
.table-chip.selected{box-shadow:0 0 0 3px var(--ink) inset;}

.cat-tabs{display:flex;gap:7px;margin-bottom:16px;overflow-x:auto;padding-bottom:4px;}
.cat-tab{padding:9px 16px;border-radius:20px;background:var(--white);border:1.5px solid var(--line);font-weight:600;font-size:13px;white-space:nowrap;color:var(--char);}
.cat-tab.active{background:var(--ink);color:var(--paper);border-color:var(--ink);}

.menu-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:12px;}
.menu-item{
  background:var(--white);border-radius:var(--radius);padding:14px;box-shadow:var(--shadow);
  display:flex;flex-direction:column;gap:6px;text-align:left;border:1.5px solid transparent;
}
.menu-item:hover{border-color:var(--green);}
.menu-item.unavailable{opacity:.45;}
.menu-item .mi-name{font-weight:700;font-size:14.5px;line-height:1.3;}
.menu-item .mi-cat{font-size:11px;color:var(--char-soft);}
.menu-item .mi-price{font-family:var(--mono);font-weight:700;color:var(--green-dark);font-size:15px;margin-top:auto;}

.open-orders-list{display:flex;flex-direction:column;gap:10px;}
.oo-row{
  background:var(--white);border-radius:var(--radius);padding:14px 16px;box-shadow:var(--shadow);
  display:flex;align-items:center;gap:14px;
}
.oo-info{flex:1;}
.oo-title{font-weight:700;font-size:15px;display:flex;align-items:center;gap:8px;}
.oo-meta{font-size:12.5px;color:var(--char-soft);margin-top:3px;}
.oo-total{font-family:var(--mono);font-weight:700;font-size:16px;}

.cart-panel{background:var(--white);border-left:1.5px solid var(--line);display:flex;flex-direction:column;height:calc(100vh - 56px);position:sticky;top:56px;}
.cart-head{padding:16px;border-bottom:1.5px solid var(--line);}
.cart-head .ch-title{font-family:var(--display);font-weight:600;font-size:18px;}
.cart-head .ch-sub{font-size:12.5px;color:var(--char-soft);font-family:var(--mono);margin-top:2px;}
.cart-items{flex:1;overflow-y:auto;padding:10px 16px;}
.cart-line{padding:10px 0;border-bottom:1px solid var(--line);}
.cl-top{display:flex;justify-content:space-between;align-items:flex-start;gap:8px;}
.cl-name{font-weight:700;font-size:13.5px;}
.cl-price{font-family:var(--mono);font-size:13px;color:var(--char-soft);}
.cl-qty{display:flex;align-items:center;gap:8px;margin-top:7px;}
.qty-btn{width:24px;height:24px;border-radius:6px;background:var(--paper-2);font-weight:800;font-size:14px;display:flex;align-items:center;justify-content:center;}
.qty-val{font-family:var(--mono);font-weight:700;min-width:18px;text-align:center;}
.cl-note{width:100%;margin-top:6px;padding:6px 8px;font-size:12px;border:1px dashed var(--line);border-radius:6px;}
.cl-remove{color:var(--red);font-size:11.5px;font-weight:700;margin-left:auto;}
.cart-totals{padding:14px 16px;border-top:1.5px dashed var(--line);font-size:13.5px;}
.ct-row{display:flex;justify-content:space-between;padding:4px 0;color:var(--char-soft);}
.ct-row.grand{color:var(--ink);font-weight:800;font-size:18px;border-top:1.5px solid var(--line);margin-top:6px;padding-top:10px;font-family:var(--mono);}
.cart-actions{padding:14px 16px;display:flex;gap:8px;}

/* ============ KDS VIEW ============ */
.kds-wrap{background:var(--ink);min-height:calc(100vh - 56px);padding:20px;}
.kds-board{display:grid;grid-template-columns:1fr 1fr 1fr;gap:18px;}
.kds-col-head{display:flex;align-items:center;gap:9px;margin-bottom:12px;padding:0 4px;}
.kds-col-head h3{color:var(--paper);font-family:var(--display);font-weight:600;font-size:17px;margin:0;}
.kds-col-head .cnt{font-family:var(--mono);background:var(--ink-soft);color:var(--paper-3);padding:2px 9px;border-radius:20px;font-size:12.5px;font-weight:700;}
.kds-col{min-height:200px;}
.kds-cards{display:flex;flex-direction:column;gap:12px;}
.kds-ticket{
  background:#1C2E23;border-radius:8px;padding:14px;border:1.5px solid #2F4439;color:var(--paper);
  position:relative;
}
.kds-ticket.urgent{border-color:var(--red);box-shadow:0 0 0 1px var(--red);}
.kt-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;}
.kt-id{font-family:var(--mono);font-weight:700;font-size:14px;color:var(--gold);}
.kt-time{font-family:var(--mono);font-size:11.5px;color:#8FA89A;}
.kt-time.urgent{color:var(--red);font-weight:700;}
.kt-meta{font-size:12px;color:#B9C4BA;margin-bottom:10px;text-transform:uppercase;letter-spacing:.3px;font-weight:700;}
.kt-items{margin-bottom:12px;}
.kt-item{display:flex;gap:8px;padding:4px 0;font-size:13.5px;border-bottom:1px solid #2C3F34;}
.kt-item:last-child{border-bottom:none;}
.kt-item .kqty{font-family:var(--mono);font-weight:700;color:var(--sage);min-width:24px;}
.kt-item .knote{display:block;font-size:11.5px;color:var(--gold);font-style:italic;margin-top:1px;}
.kt-action{width:100%;}

/* ============ ADMIN VIEW ============ */
.admin-wrap{display:flex;min-height:calc(100vh - 56px);}
.admin-side{width:200px;background:var(--white);border-right:1.5px solid var(--line);padding:16px 10px;}
.admin-nav-btn{display:flex;align-items:center;gap:10px;padding:11px 14px;border-radius:8px;width:100%;text-align:left;font-weight:600;font-size:13.5px;color:var(--char);margin-bottom:3px;}
.admin-nav-btn.active{background:var(--ink);color:var(--paper);}
.admin-nav-btn:not(.active):hover{background:var(--paper-2);}
.admin-main{flex:1;padding:24px 28px;overflow-y:auto;}

.stat-row{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:24px;}
.stat-card{background:var(--white);border-radius:var(--radius);padding:18px;box-shadow:var(--shadow);}
.stat-card .sc-label{font-size:11.5px;color:var(--char-soft);text-transform:uppercase;letter-spacing:.4px;font-weight:700;}
.stat-card .sc-val{font-family:var(--mono);font-weight:700;font-size:25px;margin-top:6px;}
.stat-card.accent{border-left:4px solid var(--green);}

table.data-table{width:100%;border-collapse:collapse;}
table.data-table th{text-align:left;font-size:11.5px;text-transform:uppercase;letter-spacing:.3px;color:var(--char-soft);padding:9px 10px;border-bottom:2px solid var(--line);}
table.data-table td{padding:11px 10px;border-bottom:1px solid var(--line);font-size:13.5px;}
table.data-table tr:last-child td{border-bottom:none;}
.row-actions{display:flex;gap:6px;}
.toggle{position:relative;width:38px;height:21px;border-radius:20px;background:var(--line);display:inline-block;}
.toggle.on{background:var(--sage);}
.toggle::after{content:"";position:absolute;width:17px;height:17px;border-radius:50%;background:white;top:2px;left:2px;transition:.15s;}
.toggle.on::after{left:19px;}

.report-range{display:flex;gap:8px;margin-bottom:18px;}
.range-btn{padding:8px 14px;border-radius:7px;border:1.5px solid var(--line);font-weight:600;font-size:13px;}
.range-btn.active{background:var(--green);color:white;border-color:var(--green);}
.report-grid{display:grid;grid-template-columns:1.3fr 1fr;gap:18px;}
.breakdown-row{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--line);font-size:13.5px;}
.breakdown-row:last-child{border-bottom:none;}
.breakdown-bar{height:6px;border-radius:4px;background:var(--paper-3);margin-top:6px;overflow:hidden;}
.breakdown-bar > div{height:100%;background:var(--green);}

/* ============ MODAL ============ */
.modal-overlay{position:fixed;inset:0;background:rgba(28,26,23,0.55);display:flex;align-items:center;justify-content:center;z-index:200;padding:20px;}
.lock-overlay{position:fixed;inset:0;background:var(--paper-2);z-index:9999;display:flex;align-items:center;justify-content:center;padding:24px;}
.lock-card{background:var(--white);border-radius:var(--radius);max-width:420px;width:100%;padding:32px 28px;text-align:center;box-shadow:var(--shadow-lg);border-top:4px solid var(--gold);}
.lock-icon{width:56px;height:56px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:26px;margin:0 auto 16px;}
.lock-icon-warn{background:var(--gold-light);}
.lock-icon-info{background:var(--sage-light);}
.lock-title{font-family:var(--display);font-weight:700;font-size:20px;margin-bottom:8px;}
.lock-sub{font-size:14px;color:var(--char-soft);margin-bottom:18px;line-height:1.6;}
.lock-stat{font-family:var(--mono);font-size:13px;background:var(--gold-light);color:var(--gold-dark);border-radius:6px;padding:6px 10px;margin-bottom:16px;display:inline-block;}
.lock-note{font-size:12px;color:var(--char-soft);margin-top:16px;line-height:1.5;}
.lock-lang-row{display:flex;gap:4px;justify-content:center;margin-top:16px;}
.lock-lang-btn{padding:4px 10px;border-radius:6px;font-size:12px;font-weight:700;color:var(--char-soft);background:none;border:none;cursor:pointer;}
.lock-lang-btn.active{background:var(--green-light);color:var(--green-dark);}
.modal-box{background:var(--white);border-radius:14px;max-width:460px;width:100%;max-height:88vh;overflow-y:auto;box-shadow:var(--shadow-lg);}
.modal-box.wide{max-width:560px;}
.modal-head{display:flex;justify-content:space-between;align-items:center;padding:18px 20px;border-bottom:1.5px solid var(--line);}
.modal-head h3{font-family:var(--display);font-weight:600;font-size:19px;margin:0;}
.modal-close{font-size:20px;color:var(--char-soft);width:30px;height:30px;border-radius:8px;display:flex;align-items:center;justify-content:center;}
.modal-close:hover{background:var(--paper-2);}
.modal-body{padding:20px;}
.modal-foot{padding:16px 20px;border-top:1.5px solid var(--line);display:flex;gap:10px;justify-content:flex-end;}

.pay-methods{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-bottom:16px;}
.pay-method{padding:11px;border-radius:8px;border:2px solid var(--line);font-weight:700;font-size:13.5px;text-align:center;}
.pay-method.active{border-color:var(--ink);background:var(--paper-2);}

/* ============ TOAST ============ */
#toast-host{position:fixed;bottom:20px;right:20px;z-index:300;display:flex;flex-direction:column;gap:8px;}
.toast{background:var(--ink);color:var(--paper);padding:12px 18px;border-radius:8px;font-size:13.5px;font-weight:600;box-shadow:var(--shadow-lg);animation:toastIn .2s ease;border-left:4px solid var(--green);}
@keyframes toastIn{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}

/* ============ PRINT ============ */
#print-root{display:none;}
@media print{
  #app, #toast-host, .modal-overlay{display:none !important;}
  #print-root{display:block !important;}
}
.receipt-print{font-family:var(--mono);width:300px;margin:0 auto;padding:14px;font-size:12px;}
.receipt-print h2{font-family:var(--display);text-align:center;margin:0 0 2px;}
.receipt-print .rp-center{text-align:center;}
.receipt-print .rp-row{display:flex;justify-content:space-between;}
.receipt-print hr{border:none;border-top:1px dashed #000;margin:8px 0;}

/* ============ RESPONSIVE ============ */
@media (max-width:980px){
  .pos-wrap{grid-template-columns:1fr;}
  .cart-panel{position:fixed;bottom:0;left:0;right:0;height:auto;max-height:55vh;border-left:none;border-top:3px solid var(--green);z-index:40;}
  .kds-board{grid-template-columns:1fr;}
  .admin-wrap{flex-direction:column;}
  .admin-side{width:100%;display:flex;overflow-x:auto;border-right:none;border-bottom:1.5px solid var(--line);}
  .admin-nav-btn{white-space:nowrap;}
  .stat-row{grid-template-columns:repeat(2,1fr);}
  .report-grid{grid-template-columns:1fr;}
  .portal-btn span.label{display:none;}
  .topbar{gap:8px;}
}
@media (max-width:520px){
  .stat-row{grid-template-columns:1fr 1fr;}
  .table-grid{grid-template-columns:repeat(auto-fill,minmax(70px,1fr));}
}
</style>

/* =========================================================
   DapurPOS — single-file restaurant ordering/billing/accounting app
   Data persists to localStorage. No backend required for v1.
   ========================================================= */

const STORE_KEY = 'DAPUR_v1';

/* ---------- utils ---------- */
function uid(prefix){ return prefix + '_' + Math.random().toString(36).slice(2,9); }
function pad(n,len){ return String(n).padStart(len,'0'); }
function fmt(n){
  const s = state.settings.currency || 'RM';
  return s + ' ' + (Math.round((n||0)*100)/100).toFixed(2);
}
function todayKey(d){ d = d || new Date(); return d.getFullYear()+'-'+pad(d.getMonth()+1,2)+'-'+pad(d.getDate(),2); }
function fmtTime(ts){ const d = new Date(ts); return pad(d.getHours(),2)+':'+pad(d.getMinutes(),2); }
function fmtDateTime(ts){ const d = new Date(ts); return d.toLocaleDateString() + ' ' + fmtTime(ts); }
function minutesSince(ts){ return Math.floor((Date.now()-ts)/60000); }
function escapeHtml(str){ return (str||'').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

function toast(msg){
  const host = document.getElementById('toast-host');
  const el = document.createElement('div');
  el.className = 'toast';
  el.textContent = msg;
  host.appendChild(el);
  setTimeout(()=>{ el.style.opacity='0'; el.style.transition='opacity .25s'; setTimeout(()=>el.remove(),250); }, 2400);
}

/* =========================================================
   SUBSCRIPTION / LICENSE CHECK-IN

   SETUP (one-time, do this once for your whole business, not per restaurant):
   1. Create a free project at https://supabase.com
   2. Open the SQL Editor in your Supabase project and run:

      create table licenses (
        id uuid primary key default gen_random_uuid(),
        license_key text unique not null,
        restaurant_name text,
        paid_until date not null,
        status text not null default 'active',
        lock_mode text not null default 'operational',
        contact_override_name text,
        contact_override_whatsapp text,
        created_at timestamptz default now()
      );

      alter table licenses enable row level security;

      grant select on public.licenses to anon;

      create policy "anon can read licenses"
      on licenses for select
      to anon
      using (true);

      -- The grant above and the policy below are two separate layers, and
      -- Supabase now requires both (newer projects no longer expose tables
      -- to the API by default). The grant says "the anon role may touch
      -- this table via the API at all"; the policy says "and it may see
      -- every row" (we don't restrict by row since the anon key is shared
      -- across every restaurant's copy of this app -- isolation comes from
      -- each restaurant only knowing its own license_key, not from RLS).
      -- No insert/update/delete grant or policy is created for the anon
      -- role on purpose, so the public key this app ships with can only
      -- ever READ rows, never write to them. All edits happen through the
      -- Table Editor or SQL Editor in your own Supabase dashboard, which
      -- uses your logged-in session, not this key.

   3. Go to Project Settings -> API and copy your Project URL and anon public
      key into LICENSE_CONFIG below. NEVER use the service_role key here.
   4. For each restaurant: insert one row, give that restaurant's copy of this
      file a unique LICENSE_KEY matching license_key, and ship it.

   ONGOING ADMIN (run in the SQL Editor whenever you need to):
      -- Add a new restaurant
      insert into licenses (license_key, restaurant_name, paid_until)
      values ('rest-001-abc123', 'Warung Selera', '2026-07-17');

      -- Mark a payment received (extend by one month from today)
      update licenses set paid_until = current_date + interval '30 days'
      where license_key = 'rest-001-abc123';

      -- Suspend one restaurant immediately, regardless of paid_until
      update licenses set status = 'suspended' where license_key = 'rest-001-abc123';

      -- Reactivate it
      update licenses set status = 'active' where license_key = 'rest-001-abc123';

      -- Switch one restaurant to hard lock (or back to operational)
      update licenses set lock_mode = 'hard' where license_key = 'rest-001-abc123';
      update licenses set lock_mode = 'operational' where license_key = 'rest-001-abc123';

      -- Set a reseller's contact info on just their client's row
      update licenses set contact_override_name = 'Reseller Name',
        contact_override_whatsapp = '60198765432' where license_key = 'rest-001-abc123';

      -- Apply hard lock to EVERY restaurant at once
      update licenses set lock_mode = 'hard';

      -- Apply hard lock only to restaurants more than 30 days overdue
      update licenses set lock_mode = 'hard'
      where paid_until < current_date - interval '30 days';

      -- Permanently remove a restaurant (locks them immediately, next check-in)
      delete from licenses where license_key = 'rest-001-abc123';

   Fill in your own Supabase project details below before deploying
   a copy of this file to a real restaurant.

   A NOTE ON KEYS: Supabase is retiring the old "anon" / "service_role" key
   names in favor of "publishable" (sb_publishable_...) and "secret"
   (sb_secret_...) keys. Whichever your project shows you, the rule is the
   same: put the PUBLISHABLE key (or anon key, if your project still shows
   the older naming) below. NEVER put the secret/service_role key in this
   file -- that key bypasses every security rule and must never leave your
   own machine, let alone ship inside an app handed to a restaurant.
   ========================================================= */
const LICENSE_CONFIG = {
  SUPABASE_URL: 'https://YOUR-PROJECT.supabase.co',       // TODO: your Supabase project URL
  SUPABASE_ANON_KEY: 'YOUR-PUBLISHABLE-OR-ANON-KEY',        // TODO: the publishable (or anon) key only -- never the secret/service_role key
  LICENSE_KEY: 'REPLACE-WITH-UNIQUE-KEY-FOR-THIS-RESTAURANT', // TODO: a unique key, one per restaurant deployment
  GRACE_DAYS_AFTER_DUE: 14,   // days allowed past paid_until before locking for non-payment
  OFFLINE_GRACE_DAYS: 5,      // days the app trusts its last successful check-in before locking itself
  CHECK_INTERVAL_HOURS: 4,    // how often to silently re-check while the app stays open
  DEFAULT_CONTACT_NAME: 'Your Business Name',   // TODO: shown on the lock screen unless a reseller override is set
  DEFAULT_CONTACT_WHATSAPP: '60123456789',       // TODO: digits only, country code first, no symbols
};
const LICENSE_STORE_KEY = 'DAPUR_LICENSE_v1';

function loadLicenseCache(){
  try{
    const raw = localStorage.getItem(LICENSE_STORE_KEY);
    if(raw) return JSON.parse(raw);
  }catch(e){}
  return {paidUntil:null, status:'active', lockMode:'operational', notFound:false, contactName:null, contactWhatsapp:null, lastCheckIn:Date.now()};
}
function saveLicenseCache(c){
  try{ localStorage.setItem(LICENSE_STORE_KEY, JSON.stringify(c)); }catch(e){}
}
let licenseCache = loadLicenseCache();

async function checkLicense(){
  try{
    const url = LICENSE_CONFIG.SUPABASE_URL + '/rest/v1/licenses?license_key=eq.' + encodeURIComponent(LICENSE_CONFIG.LICENSE_KEY) + '&select=paid_until,status,lock_mode,contact_override_name,contact_override_whatsapp';
    const res = await fetch(url, {
      headers:{ apikey: LICENSE_CONFIG.SUPABASE_ANON_KEY, Authorization: 'Bearer ' + LICENSE_CONFIG.SUPABASE_ANON_KEY }
    });
    if(!res.ok) throw new Error('license check-in failed: ' + res.status);
    const rows = await res.json();
    if(rows.length===0){
      licenseCache = {...licenseCache, notFound:true, lastCheckIn:Date.now()};
    } else {
      const row = rows[0];
      licenseCache = {
        paidUntil: row.paid_until,
        status: row.status,
        lockMode: row.lock_mode || 'operational',
        notFound: false,
        contactName: row.contact_override_name || null,
        contactWhatsapp: row.contact_override_whatsapp || null,
        lastCheckIn: Date.now()
      };
    }
    saveLicenseCache(licenseCache);
  }catch(err){
    console.warn('license check-in error (will retry):', err.message);
  }
  applyLicenseLock();
}

function computeLockState(){
  const now = Date.now();
  const daysSinceCheckIn = (now - (licenseCache.lastCheckIn || now)) / 86400000;
  if(daysSinceCheckIn > LICENSE_CONFIG.OFFLINE_GRACE_DAYS){
    return {locked:true, reason:'offline', lockMode: licenseCache.lockMode || 'operational'};
  }
  if(licenseCache.notFound || licenseCache.status==='suspended'){
    return {locked:true, reason:'payment', lockMode: licenseCache.lockMode || 'operational'};
  }
  if(licenseCache.paidUntil){
    const lockDate = new Date(licenseCache.paidUntil).getTime() + LICENSE_CONFIG.GRACE_DAYS_AFTER_DUE*86400000;
    if(now > lockDate) return {locked:true, reason:'payment', lockMode: licenseCache.lockMode || 'operational'};
  }
  return {locked:false};
}

function renderLockCard(reason, lockMode){
  const isOffline = reason==='offline';
  const contactName = licenseCache.contactName || LICENSE_CONFIG.DEFAULT_CONTACT_NAME;
  const contactWa = licenseCache.contactWhatsapp || LICENSE_CONFIG.DEFAULT_CONTACT_WHATSAPP;
  const waLink = 'https://wa.me/' + contactWa;
  let overdueStat = '';
  if(!isOffline && !licenseCache.notFound && licenseCache.paidUntil){
    const daysOverdue = Math.floor((Date.now() - new Date(licenseCache.paidUntil).getTime())/86400000);
    if(daysOverdue>0) overdueStat = `<div class="lock-stat">${t('lock_overdue_days',{n:daysOverdue})}</div>`;
  }
  return `
    <div class="lock-card">
      <div class="lock-icon ${isOffline?'lock-icon-info':'lock-icon-warn'}">${isOffline?'📡':'🔒'}</div>
      <div class="lock-title">${isOffline ? t('lock_title_offline') : t('lock_title_payment')}</div>
      <div class="lock-sub">${isOffline ? t('lock_sub_offline') : t('lock_sub_payment')}</div>
      ${overdueStat}
      ${isOffline
        ? `<button class="btn btn-primary btn-block" data-action="retry-license-check">${t('lock_retry')}</button>`
        : `<a class="btn btn-primary btn-block" href="${waLink}" target="_blank" rel="noopener" style="text-decoration:none;display:flex;align-items:center;justify-content:center;">${t('lock_contact')} ${escapeHtml(contactName)}</a>`
      }
      ${lockMode==='operational' ? `<div class="lock-note">${t('lock_data_safe')}</div>` : ''}
      <div class="lock-lang-row">
        <button class="lock-lang-btn ${state.ui.lang==='ms'?'active':''}" data-action="set-lang" data-lang="ms">BM</button>
        <button class="lock-lang-btn ${state.ui.lang==='en'?'active':''}" data-action="set-lang" data-lang="en">EN</button>
        <button class="lock-lang-btn ${state.ui.lang==='zh'?'active':''}" data-action="set-lang" data-lang="zh">中文</button>
      </div>
    </div>
  `;
}
let lastAppliedLockSignature = null;
function applyLicenseLock(){
  const lock = computeLockState();
  const signature = JSON.stringify(lock);
  const root = document.getElementById('lock-root');
  root.innerHTML = (lock.locked && lock.lockMode==='hard') ? `<div class="lock-overlay">${renderLockCard(lock.reason, lock.lockMode)}</div>` : '';
  if(signature !== lastAppliedLockSignature){
    lastAppliedLockSignature = signature;
    renderCurrent();
  }
}

function load(){
  try{
    const raw = localStorage.getItem(STORE_KEY);
    if(raw) return JSON.parse(raw);
  }catch(e){ console.warn('load failed', e); }
  return seedData();
}
function save(){
  try{ localStorage.setItem(STORE_KEY, JSON.stringify(state)); }catch(e){ console.warn('save failed', e); }
}

let state = load();
// patch any malformed item ids from older seeds (defensive)
state.orders.forEach(o=>o.items.forEach(it=>{ if(it.itemId && it.itemId.indexOf(':')>-1) it.itemId = it.itemId.replace(':','_'); }));
// migrate older saved states that predate language support / expense category keys
if(!state.ui.lang) state.ui.lang = 'ms';
if(!state.loyalty){
  state.loyalty = {enabled:false, type:'points', pointsPerRM:1, stampsPerVisit:1, rewards:[]};
}
if(!state.customers) state.customers = [];
if(!state.expenseCategories){
  state.expenseCategories = defaultExpenseCategories();
  const oldKeyToId = {ingredients:'ec_ingredients', utilities:'ec_utilities', rent:'ec_rent', wages:'ec_wages', equipment:'ec_equipment', other:'ec_other'};
  state.expenses.forEach(e=>{
    if(e.categoryId) return;
    const raw = (e.category||'').toLowerCase();
    const normalized = EXP_CAT_KEYS_RAW[raw] || raw;
    e.categoryId = oldKeyToId[normalized] || 'ec_other';
    delete e.category;
  });
}

/* ---------- derived helpers ---------- */
function getCategory(id){ return state.categories.find(c=>c.id===id); }
function getItem(id){ return state.items.find(i=>i.id===id); }
function getTable(id){ return state.tables.find(t=>t.id===id); }
function getOrder(id){ return state.orders.find(o=>o.id===id); }
function getCustomerByPhone(phone){ return state.customers.find(c=>c.phone===phone); }
function getReward(id){ return state.loyalty.rewards.find(r=>r.id===id); }
function loyaltyBalanceLabel(customer){
  if(!customer) return '';
  const n = state.loyalty.type==='points' ? customer.points : customer.stamps;
  const unit = state.loyalty.type==='points' ? t('points_unit') : t('stamps_unit');
  return n + ' ' + unit;
}
function rewardDiscountAmount(reward, subtotal){
  if(!reward) return 0;
  if(reward.kind==='discount_pct') return subtotal * (reward.value/100);
  return reward.value;
}

function orderTotal(order){ return order.items.reduce((s,it)=>s+it.price*it.qty,0); }

function computeBillFor(items, discount){
  const subtotal = items.reduce((s,it)=>s+it.price*it.qty,0);
  const sc = state.settings.serviceChargeRate ? subtotal * state.settings.serviceChargeRate/100 : 0;
  const taxable = subtotal + sc;
  const tax = state.settings.taxEnabled ? taxable * state.settings.taxRate/100 : 0;
  const total = Math.max(0, subtotal + sc + tax - (discount||0));
  return {subtotal, serviceCharge:sc, tax, discount: discount||0, total};
}

function unpaidOrdersForTable(tableId){
  return state.orders.filter(o=>o.tableId===tableId && !['billed','paid'].includes(o.status));
}
function activeTakeawayOrders(){
  return state.orders.filter(o=>o.type==='takeaway' && !['billed','paid'].includes(o.status));
}
function kdsActiveOrders(){
  return state.orders.filter(o=>['new','preparing','ready'].includes(o.status));
}

/* ---- POS actions ---- */
function posSetType(type){
  state.draft = {type, tableId:null, orderId:null, items:[], discount:0};
  renderPosTabContent(); renderCart();
}
function posSelectTable(tableId){
  const tbl = getTable(tableId);
  if(tbl.status==='available'){
    state.draft = {type:'dine-in', tableId, orderId:null, items:[], discount:0};
  } else {
    // resume: just focus the cart for adding more items to this table
    state.draft = {type:'dine-in', tableId, orderId:null, items:[], discount:0};
    toast(t('toast_adding_round',{n:tbl.number}));
  }
  renderPosTabContent(); renderCart();
}
function posAddItem(itemId){
  const item = getItem(itemId);
  if(!item || !item.available) return;
  if(state.draft.type==='dine-in' && !state.draft.tableId){ toast(t('toast_select_table')); return; }
  const existing = state.draft.items.find(i=>i.itemId===itemId && !i.notes);
  if(existing){ existing.qty++; }
  else state.draft.items.push({itemId, name:item.name, price:item.price, qty:1, notes:''});
  renderCart();
}
function posQtyChange(idx, delta){
  const it = state.draft.items[idx];
  if(!it) return;
  it.qty += delta;
  if(it.qty<=0) state.draft.items.splice(idx,1);
  renderCart();
}
function posRemove(idx){ state.draft.items.splice(idx,1); renderCart(); }
function posNote(idx, val){ if(state.draft.items[idx]) state.draft.items[idx].notes = val; }
function posClearCart(){ state.draft.items = []; renderCart(); }

function posSendKitchen(){
  const d = state.draft;
  if(d.items.length===0) return;
  state.counters.order++;
  const orderNo = 'ORD-' + pad(state.counters.order,4);
  const order = {
    id: uid('ord'), orderNo, type:d.type,
    tableId: d.type==='dine-in' ? d.tableId : null,
    queueNo: d.type==='takeaway' ? state.counters.order : null,
    items: d.items.map(i=>({...i})),
    status:'new', createdAt: Date.now()
  };
  state.orders.push(order);
  if(d.type==='dine-in'){
    const tbl = getTable(d.tableId);
    tbl.status = 'occupied';
    tbl.currentOrderIds = [...(tbl.currentOrderIds||[]), order.id];
  }
  state.draft = {type:d.type, tableId: d.type==='dine-in'?d.tableId:null, orderId:null, items:[], discount:0};
  toast(t('toast_sent_kitchen',{orderNo}));
  save();
  renderCurrent();
}

function openBillModalForTable(tableId){
  const tbl = getTable(tableId);
  const orders = unpaidOrdersForTable(tableId);
  if(orders.length===0){ toast(t('toast_nothing_to_bill')); return; }
  const allItems = orders.flatMap(o=>o.items);
  tbl.status = 'billing';
  save(); renderCurrent();
  openBillModal({label:t('table_prefix',{n:tbl.number}), orders, items:allItems, tableId});
}
function openBillModalForOrder(orderId){
  const o = getOrder(orderId);
  openBillModal({label:t('oo_takeaway_prefix',{n:o.queueNo}), orders:[o], items:o.items, orderId});
}

function billsInRange(start,end){
  return state.bills.filter(b=>b.paidAt>=start && b.paidAt<end);
}
function expensesInRange(startKey,endKey){
  return state.expenses.filter(e=>e.date>=startKey && e.date<=endKey);
}
function rangeFor(key){
  const now = new Date();
  if(key==='today'){
    const s = new Date(); s.setHours(0,0,0,0);
    const e = new Date(); e.setHours(23,59,59,999);
    return {start:s.getTime(), end:e.getTime(), startKey:todayKey(s), endKey:todayKey(e)};
  }
  if(key==='week'){
    const s = new Date(); s.setDate(s.getDate()-6); s.setHours(0,0,0,0);
    const e = new Date(); e.setHours(23,59,59,999);
    return {start:s.getTime(), end:e.getTime(), startKey:todayKey(s), endKey:todayKey(e)};
  }
  if(key==='month'){
    const s = new Date(now.getFullYear(), now.getMonth(),1);
    const e = new Date(); e.setHours(23,59,59,999);
    return {start:s.getTime(), end:e.getTime(), startKey:todayKey(s), endKey:todayKey(e)};
  }
  const s = new Date(0); const e = new Date(); e.setHours(23,59,59,999);
  return {start:s.getTime(), end:e.getTime(), startKey:'0000-00-00', endKey:todayKey(e)};
}

function rangeLabel(k){ return {today:t('rep_today'), week:t('rep_week'), month:t('rep_month'), all:t('rep_all')}[k] || k; }

function renderAdminOverview(){
  const r = rangeFor('today');
  const bills = billsInRange(r.start, r.end);
  const revenue = bills.reduce((s,b)=>s+b.total,0);
  const orderCount = bills.length;
  const avg = orderCount ? revenue/orderCount : 0;
  const itemCounts = {};
  const ordersToday = state.orders.filter(o=>(o.status==='paid' || o.status==='billed') && o.createdAt>=r.start && o.createdAt<=r.end);
  ordersToday.forEach(o=>o.items.forEach(it=>{ itemCounts[it.name]=(itemCounts[it.name]||0)+it.qty; }));
  const topItem = Object.entries(itemCounts).sort((a,b)=>b[1]-a[1])[0];

function renderAdminReports(){
  const range = state.ui.reportRange;
  const r = rangeFor(range);
  const bills = billsInRange(r.start, r.end);
  const expenses = expensesInRange(r.startKey, r.endKey);
  const revenue = bills.reduce((s,b)=>s+b.total,0);
  const totalExpenses = expenses.reduce((s,e)=>s+e.amount,0);
  const profit = revenue - totalExpenses;

  const byMethod = {};
  bills.forEach(b=>{ byMethod[b.paymentMethod] = (byMethod[b.paymentMethod]||0) + b.total; });
  const byExpCat = {};
  expenses.forEach(e=>{ byExpCat[e.categoryId] = (byExpCat[e.categoryId]||0) + e.amount; });
  const fixedTotal = expenses.filter(e=>getExpCategory(e.categoryId)?.group==='fixed').reduce((s,e)=>s+e.amount,0);
  const variableTotal = expenses.filter(e=>getExpCategory(e.categoryId)?.group==='variable').reduce((s,e)=>s+e.amount,0);

  const maxMethod = Math.max(1, ...Object.values(byMethod));
  const maxExp = Math.max(1, ...Object.values(byExpCat));

  return `
    <div class="section-title">${t('rep_title')}</div>
    <div class="section-sub">${t('rep_subtitle')}</div>
    <div class="report-range">
      ${['today','week','month','all'].map(k=>`<button class="range-btn ${range===k?'active':''}" data-action="set-range" data-range="${k}">${rangeLabel(k)}</button>`).join('')}
      <button class="btn btn-outline btn-sm" data-action="print-report" style="margin-left:auto;">${t('rep_print')}</button>
      <button class="btn btn-outline btn-sm" data-action="download-report-pdf">${t('rep_download_pdf')}</button>
      <button class="btn btn-outline btn-sm" data-action="download-report-excel">${t('rep_download_excel')}</button>
    </div>
    <div class="stat-row" style="grid-template-columns:repeat(3,1fr);">
      <div class="stat-card accent"><div class="sc-label">${t('rep_revenue')}</div><div class="sc-val">${fmt(revenue)}</div></div>
      <div class="stat-card"><div class="sc-label">${t('rep_expenses')}</div><div class="sc-val">${fmt(totalExpenses)}</div></div>
      <div class="stat-card"><div class="sc-label">${t('rep_net_profit')}</div><div class="sc-val" style="color:${profit>=0?'var(--green-dark)':'var(--red)'}">${fmt(profit)}</div></div>
    </div>
    <div class="section-sub" style="margin-top:-10px;">${t('rep_fixed_total',{amount:fmt(fixedTotal)})} · ${t('rep_variable_total',{amount:fmt(variableTotal)})}</div>
    <div class="report-grid">
      <div class="card">
        <strong>${t('rep_transactions',{n:bills.length})}</strong>
        <table class="data-table" style="margin-top:10px;">
          <tr><th>${t('col_bill_no')}</th><th>${t('col_when')}</th><th>${t('col_method')}</th><th>${t('col_total')}</th></tr>
          ${bills.length? bills.map(b=>`<tr><td class="ticket-num">${b.billNo}</td><td>${fmtDateTime(b.paidAt)}</td><td>${payMethodLabel(b.paymentMethod)}</td><td class="ticket-num">${fmt(b.total)}</td></tr>`).join('') : `<tr><td colspan="4" style="text-align:center;color:var(--char-soft);padding:18px;">${t('rep_no_bills')}</td></tr>`}
        </table>
      </div>
      <div>
        <div class="card" style="margin-bottom:14px;">
          <strong>${t('rep_by_method')}</strong>
          ${Object.keys(byMethod).length? Object.entries(byMethod).map(([k,v])=>`
            <div class="breakdown-row"><span>${payMethodLabel(k)}</span><span class="ticket-num">${fmt(v)}</span></div>
            <div class="breakdown-bar"><div style="width:${(v/maxMethod*100)}%"></div></div>
          `).join('') : `<div class="empty-state" style="padding:20px;">${t('rep_no_data')}</div>`}
        </div>
        <div class="card">
          <strong>${t('rep_by_expense_cat')}</strong>
          ${Object.keys(byExpCat).length? Object.entries(byExpCat).map(([k,v])=>`
            <div class="breakdown-row"><span>${escapeHtml(expCatLabel(k))}</span><span class="ticket-num">${fmt(v)}</span></div>
            <div class="breakdown-bar"><div style="background:var(--gold);width:${(v/maxExp*100)}%"></div></div>
          `).join('') : `<div class="empty-state" style="padding:20px;">${t('rep_no_data')}</div>`}
        </div>
      </div>
    </div>
  `;
}

function openModal(html, opts){
  const root = document.getElementById('modal-root');
  root.innerHTML = `<div class="modal-overlay" data-action="modal-overlay-click">${html}</div>`;
  root.querySelector('.modal-overlay').addEventListener('click', (e)=>{
    if(e.target.classList.contains('modal-overlay')) closeModal();
  });
}
function closeModal(){
  if(billCtx && billCtx.tableId){
    const t = getTable(billCtx.tableId);
    if(t && t.status==='billing'){ t.status='occupied'; save(); renderCurrent(); }

let billCtx = null; // {label, orders, items, tableId?, orderId?, discount, paymentMethod}

function openBillModal(ctx){

function renderBillModal(){

  const customer = (L.enabled && billCtx.customerPhone) ? getCustomerByPhone(billCtx.customerPhone) : null;
  const balanceNow = customer ? (L.type==='points' ? customer.points : customer.stamps) : 0;
  const affordableRewards = L.enabled ? L.rewards.filter(r=>r.cost<=balanceNow) : [];
  const redeemedReward = billCtx.redeemRewardId ? getReward(billCtx.redeemRewardId) : null;
  const preLoyaltySubtotal = computeBillFor(billCtx.items, 0).subtotal;
  const loyaltyDiscount = redeemedReward ? rewardDiscountAmount(redeemedReward, preLoyaltySubtotal) : 0;
  const calc = computeBillFor(billCtx.items, (billCtx.discount||0) + loyaltyDiscount);
  const change = billCtx.paymentMethod==='cash' ? Math.max(0,(billCtx.cashGiven||0)-calc.total) : 0;
  openModal(`
    <div class="modal-box wide">
      <div class="modal-head"><h3>${t('bill_title',{label:escapeHtml(billCtx.label)})}</h3><button class="modal-close" data-action="close-modal">×</button></div>
      <div class="modal-body">
        <div class="ticket" style="padding:18px 16px;">

          <div style="display:flex;justify-content:space-between;font-size:13px;color:var(--char-soft);"><span>${t('bill_subtotal')}</span><span>${fmt(calc.subtotal)}</span></div>
          <div style="display:flex;justify-content:space-between;font-size:13px;color:var(--char-soft);"><span>${t('bill_service_word')} (${state.settings.serviceChargeRate}%)</span><span>${fmt(calc.serviceCharge)}</span></div>

          <div style="display:flex;justify-content:space-between;font-size:13px;color:var(--char-soft);"><span>${t('bill_discount_word')}</span><span>−${fmt(calc.discount)}</span></div>
          <div class="tear"></div>
          <div style="display:flex;justify-content:space-between;font-weight:800;font-size:19px;" class="ticket-num"><span>${t('bill_total_word')}</span><span>${fmt(calc.total)}</span></div>
        </div>

        <div class="field" style="margin-top:16px;">
          <span class="field-label">${t('bill_discount_field',{currency:state.settings.currency})}</span>
          <input class="input" type="number" id="bill-discount" value="${billCtx.discount}" min="0">
        </div>

        ${L.enabled ? `
        <div class="field">
          <span class="field-label">${t('bill_customer_phone')}</span>
          <input class="input" id="bill-phone" value="${escapeHtml(billCtx.customerPhone||'')}" placeholder="012-3456789">
        </div>
        ${customer ? `<div class="section-sub" style="margin:-4px 0 10px;">${t('bill_loyalty_balance',{n:loyaltyBalanceLabel(customer)})}</div>` : ''}
        ${affordableRewards.length ? `
        <div class="field">
          <span class="field-label">${t('bill_redeem_reward')}</span>
          <select class="select" id="bill-reward">
            <option value="">${t('bill_redeem_none')}</option>

          ${['cash','card','e-wallet','bank transfer'].map(m=>`<button class="pay-method ${billCtx.paymentMethod===m?'active':''}" data-action="set-pay-method" data-m="${m}">${payMethodLabel(m)}</button>`).join('')}
        </div>

function billSetDiscount(val){ billCtx.discount = parseFloat(val)||0; renderBillModal(); }
function billSetMethod(m){ billCtx.paymentMethod = m; renderBillModal(); }
function billSetCash(val){ billCtx.cashGiven = parseFloat(val)||0; renderBillModal(); }
function billSetPhone(val){ billCtx.customerPhone = val.trim(); billCtx.redeemRewardId = null; renderBillModal(); }
function billSetReward(id){ billCtx.redeemRewardId = id || null; renderBillModal(); }

function confirmPayment(){
  const L = state.loyalty;
  const redeemedReward = billCtx.redeemRewardId ? getReward(billCtx.redeemRewardId) : null;
  const preLoyaltySubtotal = computeBillFor(billCtx.items, 0).subtotal;
  const loyaltyDiscount = redeemedReward ? rewardDiscountAmount(redeemedReward, preLoyaltySubtotal) : 0;
  const calc = computeBillFor(billCtx.items, (billCtx.discount||0) + loyaltyDiscount);
  if(billCtx.paymentMethod==='cash' && (billCtx.cashGiven||0) < calc.total){
    toast(t('toast_cash_less')); return;
  }
  state.counters.bill++;
  const billNo = 'INV-' + todayKey() + '-' + pad(state.counters.bill,3);
  const bill = {
    id: uid('bill'), billNo,
    tableLabel: billCtx.label,
    subtotal: calc.subtotal, serviceCharge: calc.serviceCharge, tax: calc.tax, discount: calc.discount, total: calc.total,
    paymentMethod: billCtx.paymentMethod, paidAt: Date.now(),
    items: billCtx.items
  };
  state.bills.push(bill);

  billCtx.orders.forEach(o=>{ o.status='paid'; });
  if(billCtx.tableId){
    const tbl = getTable(billCtx.tableId);
    tbl.status='available'; tbl.currentOrderIds=[];
  }

  if(L.enabled && billCtx.customerPhone){
    let customer = getCustomerByPhone(billCtx.customerPhone);
    if(!customer){
      customer = {id:uid('cust'), phone:billCtx.customerPhone, points:0, stamps:0, visits:0, createdAt:Date.now()};
      state.customers.push(customer);
    }
    if(redeemedReward){
      if(L.type==='points') customer.points = Math.max(0, customer.points - redeemedReward.cost);
      else customer.stamps = Math.max(0, customer.stamps - redeemedReward.cost);
      toast(t('toast_reward_redeemed'));
    }
    customer.visits = (customer.visits||0) + 1;
    if(L.type==='points'){
      const earned = Math.floor(calc.total * (L.pointsPerRM||0));
      customer.points += earned;
      if(earned>0) toast(t('toast_points_earned',{n:earned}));
    } else {
      customer.stamps += (L.stampsPerVisit||0);
      if(L.stampsPerVisit>0) toast(t('toast_stamp_earned'));
    }
  }

  save();
  closeModal();
  toast(t('toast_payment_confirmed',{billNo}));
  printReceipt(bill);
  renderCurrent();
}

function downloadReportPDF(){
  if(!window.jspdf){ toast('PDF library failed to load — check your internet connection'); return; }
  const range = state.ui.reportRange;
  const r = rangeFor(range);
  const bills = billsInRange(r.start, r.end);
  const expenses = expensesInRange(r.startKey, r.endKey);
  const revenue = bills.reduce((s,b)=>s+b.total,0);
  const totalExpenses = expenses.reduce((s,e)=>s+e.amount,0);
  const fixedTotal = expenses.filter(e=>getExpCategory(e.categoryId)?.group==='fixed').reduce((s,e)=>s+e.amount,0);
  const variableTotal = expenses.filter(e=>getExpCategory(e.categoryId)?.group==='variable').reduce((s,e)=>s+e.amount,0);

  const { jsPDF } = window.jspdf;
  const doc = new jsPDF();
  let y = 18;
  doc.setFontSize(16); doc.text(state.settings.restaurantName, 14, y); y+=7;
  doc.setFontSize(11); doc.text(t('report_print_title',{range:rangeLabel(range)}), 14, y); y+=10;

  doc.setFontSize(10);
  doc.text(`${t('rep_revenue')}: ${fmt(revenue)}`, 14, y); y+=6;
  doc.text(`${t('rep_expenses')}: ${fmt(totalExpenses)}`, 14, y); y+=6;
  doc.text(`${t('rep_net_profit')}: ${fmt(revenue-totalExpenses)}`, 14, y); y+=6;
  doc.text(`${t('rep_fixed_total',{amount:fmt(fixedTotal)})} / ${t('rep_variable_total',{amount:fmt(variableTotal)})}`, 14, y); y+=10;

  doc.setFontSize(12); doc.text(t('report_bills_label'), 14, y); y+=7;
  doc.setFontSize(9);
  if(bills.length){
    bills.forEach(b=>{
      if(y>275){ doc.addPage(); y=18; }
      doc.text(String(b.billNo), 14, y);
      doc.text(fmtDateTime(b.paidAt), 65, y);
      doc.text(payMethodLabel(b.paymentMethod), 120, y);
      doc.text(fmt(b.total), 196, y, {align:'right'});
      y+=6;
    });
  } else { doc.text(t('report_none'), 14, y); y+=6; }
  y+=8;

  doc.setFontSize(12); doc.text(t('report_expenses_label'), 14, y); y+=7;
  doc.setFontSize(9);
  if(expenses.length){
    expenses.forEach(e=>{
      if(y>275){ doc.addPage(); y=18; }
      doc.text(e.date, 14, y);
      doc.text(expCatLabel(e.categoryId), 50, y);
      doc.text((e.description||'').slice(0,40), 95, y);
      doc.text(fmt(e.amount), 196, y, {align:'right'});
      y+=6;
    });
  } else { doc.text(t('report_none'), 14, y); y+=6; }

  doc.save(`report-${range}-${todayKey()}.pdf`);
}

function downloadReportExcel(){

  }));

document.addEventListener('click', (e)=>{
  const btn = e.target.closest('[data-action]');
  if(!btn) return;
  const a = btn.dataset.action;

  switch(a){
    case 'switch-view': setView(btn.dataset.view); break;
    case 'set-lang': setLang(btn.dataset.lang); break;
    case 'retry-license-check': checkLicense(); break;
    case 'pos-tab': state.ui.posTab = btn.dataset.tab; renderPosTabContent(); if(btn.dataset.tab==='new') renderCart(); save(); break;
    case 'set-type': posSetType(btn.dataset.type); break;
    case 'select-table': posSelectTable(btn.dataset.id); break;
    case 'select-cat': state.ui.selectedCategory = btn.dataset.id; renderPosTabContent(); break;
    case 'add-item': posAddItem(btn.dataset.id); break;
    case 'qty-inc': posQtyChange(parseInt(btn.dataset.idx), 1); break;
    case 'qty-dec': posQtyChange(parseInt(btn.dataset.idx), -1); break;
    case 'cart-remove': posRemove(parseInt(btn.dataset.idx)); break;
    case 'clear-cart': posClearCart(); break;
    case 'send-kitchen': posSendKitchen(); break;
    case 'resume-table': state.ui.posTab='new'; posSelectTable(btn.dataset.id); renderPOS(); break;
    case 'generate-bill-table': openBillModalForTable(btn.dataset.id); break;
    case 'generate-bill-order': openBillModalForOrder(btn.dataset.id); break;

    case 'kds-advance': kdsAdvance(btn.dataset.id, btn.dataset.to); break;

    case 'admin-tab': state.ui.adminTab = btn.dataset.tab; renderAdminMain(); save(); break;
    case 'toggle-item': adminToggleItemAvail(btn.dataset.id); break;
    case 'delete-item': adminDeleteItem(btn.dataset.id); break;
    case 'open-edit-item': openAddItemModal(btn.dataset.id); break;
    case 'open-add-item': openAddItemModal(null); break;
    case 'confirm-save-item': confirmSaveItem(btn.dataset.id || null); break;
    case 'open-add-category': openAddCategoryModal(); break;
    case 'confirm-add-category': confirmAddCategory(); break;
    case 'delete-category': adminDeleteCategory(btn.dataset.id); break;
    case 'open-add-table': openAddTableModal(); break;
    case 'confirm-add-table': confirmAddTable(); break;
    case 'delete-table': adminDeleteTable(btn.dataset.id); break;
    case 'open-add-expense': openAddExpenseModal(); break;
    case 'confirm-add-expense': confirmAddExpense(); break;
    case 'delete-expense': adminDeleteExpense(btn.dataset.id); break;
    case 'open-add-exp-category': openAddExpCategoryModal(btn.dataset.group); break;
    case 'toggle-loyalty': toggleLoyaltyEnabled(); break;
    case 'set-loyalty-type': setLoyaltyType(btn.dataset.type); break;
    case 'save-loyalty-settings': saveLoyaltySettings(); break;
    case 'open-add-reward': openAddRewardModal(); break;
    case 'confirm-add-reward': confirmAddReward(); break;
    case 'delete-reward': deleteReward(btn.dataset.id); break;
    case 'confirm-add-exp-category': confirmAddExpCategory(); break;
    case 'delete-exp-category': adminDeleteExpCategory(btn.dataset.id); break;
    case 'set-range': state.ui.reportRange = btn.dataset.range; renderAdminMain(); save(); break;
    case 'print-report': printReport(); break;
    case 'download-report-pdf': downloadReportPDF(); break;
    case 'download-report-excel': downloadReportExcel(); break;
    case 'save-settings': saveSettingsFromForm(); break;
    case 'reset-demo': resetDemo(); break;
    case 'clear-all': clearAll(); break;

    case 'set-pay-method': billSetMethod(btn.dataset.m); break;
    case 'confirm-payment': confirmPayment(); break;
    case 'close-modal': closeModal(); break;
  }
});

document.addEventListener('input', (e)=>{
  const el = e.target;
  if(el.dataset && el.dataset.action==='cart-note'){ posNote(parseInt(el.dataset.idx), el.value); }
  if(el.id==='bill-discount'){ billSetDiscount(el.value); }
  if(el.id==='bill-cash'){ billSetCash(el.value); }
});
document.addEventListener('change', (e)=>{
  const el = e.target;
  if(el.id==='bill-phone'){ billSetPhone(el.value); }
  if(el.id==='bill-reward'){ billSetReward(el.value); }
});

/* =========================================================
   INIT
   ========================================================= */
function tick(){ renderTopbar(); }
setInterval(tick, 1000);
setInterval(()=>{ if(state.ui.currentView==='kds') renderKDS(); }, 15000);

setView(state.ui.currentView || 'pos');
applyLicenseLock();
checkLicense();
setInterval(checkLicense, LICENSE_CONFIG.CHECK_INTERVAL_HOURS*3600000);
</script>
</body>
</html>
